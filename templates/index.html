<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Core</title>

    <style>

        body {
            background: #0b0f1a;
            color: white;
            font-family: Arial;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #00ffe1;
            margin-top: 40px;
            font-size: 60px;
        }

        #chat {
            margin-top: 30px;
            height: 500px;
            overflow-y: auto;
            border: 2px solid #00ffe1;
            padding: 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
        }

        .msg {
            margin: 12px 0;
            padding: 14px;
            border-radius: 12px;
            text-align: left;
            font-size: 18px;
        }

        .user { background: #1d3557; }

        .jarvis {
            background: #00ffe1;
            color: black;
        }

        button {
            margin-top: 20px;
            padding: 18px 35px;
            border: none;
            border-radius: 15px;
            background: #00ffe1;
            font-size: 20px;
            cursor: pointer;
        }

        button:hover { opacity: 0.9; }

        input {
            width: 80%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

    <h1>JARVIS CORE</h1>

    <button onclick="startVoice()">🎤 Grabar audio</button>
    <button onclick="stopVoice()">⏹️ Enviar audio</button>

    <br>

    <input id="textInput" type="text" placeholder="Hablar con JARVIS...">

    <br>

    <button onclick="sendManual()">Enviar</button>

    <div id="chat"></div>

    <script>

        const chat = document.getElementById("chat");
        const input = document.getElementById("textInput");

        let mediaRecorder;
        let audioChunks = [];

        function addMessage(text, cls) {
            const div = document.createElement("div");
            div.className = "msg " + cls;
            div.innerText = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // 🧠 TEXTO MANUAL
        async function sendMessage(message) {

            addMessage("🧑 " + message, "user");

            try {

                const response = await fetch("/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                const text =
                    data.response?.response ??
                    data.response ??
                    "Sin respuesta";

                addMessage("🤖 " + text, "jarvis");

                speak(text);

            } catch (err) {
                console.log(err);
                addMessage("🤖 Error conectando con JARVIS", "jarvis");
            }
        }

        function sendManual() {
            const text = input.value;
            if (!text) return;

            sendMessage(text);
            input.value = "";
        }

        // 🎤 AUDIO REAL (FIX DEFINITIVO)
        async function startVoice() {

            try {

                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.onstop = async () => {

                    const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

                    const formData = new FormData();
                    formData.append("audio", audioBlob, "audio.webm");

                    addMessage("🎤 Enviando audio...", "user");

                    const res = await fetch("/audio", {
                        method: "POST",
                        body: formData
                    });

                    const data = await res.json();

                    const text =
                        data.response?.response ??
                        data.response ??
                        "Sin respuesta";

                    addMessage("🤖 " + text, "jarvis");

                    speak(text);
                };

                mediaRecorder.start();

                addMessage("🔴 Grabando audio... toca 'Enviar audio'", "user");

            } catch (err) {
                console.log(err);
                alert("No se pudo acceder al micrófono");
            }
        }

        function stopVoice() {
            if (mediaRecorder) {
                mediaRecorder.stop();
            }
        }

        // 🔊 SPEAK
        function speak(text) {
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = "es-ES";
            speech.rate = 1;
            speech.pitch = 1;
            window.speechSynthesis.speak(speech);
        }

        // ⌨ ENTER
        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendManual();
            }
        });

    </script>

</body>

</html>
