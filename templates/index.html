<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JARVIS Core</title>

    <style>

        body {

            background: #0b0f1a;
            color: white;
            font-family: Arial;
            padding: 20px;
            text-align: center;
        }

        h1 {

            color: #00ffe1;
            margin-top: 40px;
            font-size: 60px;
        }

        #chat {

            margin-top: 30px;
            height: 500px;
            overflow-y: auto;
            border: 2px solid #00ffe1;
            padding: 15px;
            border-radius: 20px;
            background: rgba(255,255,255,0.02);
        }

        .msg {

            margin: 12px 0;
            padding: 14px;
            border-radius: 12px;
            text-align: left;
            font-size: 18px;
        }

        .user {

            background: #1d3557;
        }

        .jarvis {

            background: #00ffe1;
            color: black;
        }

        button {

            margin-top: 20px;
            padding: 18px 35px;
            border: none;
            border-radius: 15px;
            background: #00ffe1;
            font-size: 20px;
            cursor: pointer;
        }

        button:hover {

            opacity: 0.9;
        }

        input {

            width: 80%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

    <h1>JARVIS CORE</h1>

    <button onclick="startVoice()">
        🎤 Hablar
    </button>

    <br>

    <input
        id="textInput"
        type="text"
        placeholder="Hablar con JARVIS..."
    >

    <br>

    <button onclick="sendManual()">
        Enviar
    </button>

    <div id="chat"></div>

    <script>

        const chat =
            document.getElementById("chat");

        const input =
            document.getElementById("textInput");

        function addMessage(text, cls) {

            const div =
                document.createElement("div");

            div.className =
                "msg " + cls;

            div.innerText = text;

            chat.appendChild(div);

            chat.scrollTop =
                chat.scrollHeight;
        }

        async function sendMessage(message) {

            addMessage(
                "🧑 " + message,
                "user"
            );

            try {

                const response =
                    await fetch("/chat", {

                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({
                        message: message
                    })
                });

                const data =
                    await response.json();

                console.log(
                    "RESPUESTA:",
                    data
                );

                let text =
                    "Sin respuesta";

                if (
                    data.response &&
                    data.response.response
                ) {

                    text =
                        data.response.response;

                } else if (data.response) {

                    text =
                        JSON.stringify(
                            data.response
                        );
                }

                addMessage(
                    "🤖 " + text,
                    "jarvis"
                );

                speak(text);

            } catch (err) {

                console.log(err);

                addMessage(
                    "🤖 Error conectando con JARVIS",
                    "jarvis"
                );
            }
        }

        function sendManual() {

            const text =
                input.value;

            if (!text) return;

            sendMessage(text);

            input.value = "";
        }

        function speak(text) {

            const speech =
                new SpeechSynthesisUtterance(
                    text
                );

            speech.lang = "es-ES";

            speech.rate = 1;

            speech.pitch = 1;

            window.speechSynthesis.speak(
                speech
            );
        }

        function startVoice() {

            const SpeechRecognition =
                window.SpeechRecognition ||
                window.webkitSpeechRecognition;

            if (!SpeechRecognition) {

                console.log(
                    "Voice no soportado"
                );

                return;
            }

            const recognition =
                new SpeechRecognition();

            recognition.lang =
                "es-ES";

            recognition.interimResults =
                false;

            recognition.maxAlternatives =
                1;

            recognition.start();

            recognition.onstart =
                function () {

                console.log(
                    "🎤 Escuchando..."
                );
            };

            recognition.onresult =
                function(event) {

                const text =
                    event.results[0][0]
                    .transcript;

                console.log(
                    "Texto:",
                    text
                );

                sendMessage(text);
            };

            recognition.onerror =
                function(event) {

                console.log(
                    "VOICE ERROR:",
                    event.error
                );
            };
        }

        input.addEventListener(
            "keypress",
            function(event) {

                if (event.key === "Enter") {

                    sendManual();
                }
            }
        );

    </script>

</body>

</html>
